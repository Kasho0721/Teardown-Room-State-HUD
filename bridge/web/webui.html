<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teardown Bridge</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --bg-2: #0b1020;
      --panel: rgba(20, 28, 45, .78);
      --panel-2: rgba(16, 23, 38, .92);
      --panel-soft: rgba(255,255,255,.04);
      --text: #f5f7fb;
      --muted: #98a6bd;
      --muted-2: #7d8aa0;
      --ok: #34c759;
      --off: #ff453a;
      --accent: #66a3ff;
      --accent-2: #8e8dff;
      --border: rgba(255,255,255,.08);
      --shadow: 0 18px 48px rgba(0,0,0,.32);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "SF Pro Display", "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(102,163,255,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(142,141,255,.16), transparent 26%),
        linear-gradient(180deg, var(--bg), var(--bg-2) 38%, #060911 100%);
      min-height: 100vh;
    }
    .wrap {
      width: min(1280px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 34px 34px 28px;
      margin-bottom: 28px;
      background:
        linear-gradient(135deg, rgba(99,166,255,.24), rgba(142,141,255,.18) 45%, rgba(255,255,255,.05) 100%),
        rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.15), transparent 64%);
      pointer-events: none;
    }
    .topline {
      color: rgba(255,255,255,.75);
      font-size: 13px;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: .95;
      letter-spacing: -0.04em;
      max-width: 780px;
    }
    .heroSub {
      margin-top: 14px;
      color: #d7e0ef;
      font-size: 16px;
      max-width: 780px;
      line-height: 1.65;
    }
    .heroMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .metaPill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #f3f7ff;
      border: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
    }
    .metaPill b { font-size: 15px; }
    .section { margin-top: 34px; }
    .sectionHead {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .sectionTitle {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .sectionDesc {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .countBadge {
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 14px;
    }
    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: var(--shadow);
      background:
        radial-gradient(circle at top right, rgba(102,163,255,.20), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        var(--panel-2);
    }
    .cardInner {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    .cardTop {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .miniLabel {
      color: rgba(255,255,255,.62);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .roomName {
      font-size: clamp(28px, 4vw, 42px);
      line-height: .95;
      letter-spacing: -0.05em;
      font-weight: 800;
      max-width: 320px;
      word-break: break-word;
    }
    .statusBadge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(16px);
    }
    .statusBadge.online {
      background: rgba(52,199,89,.16);
      color: #74e696;
      border: 1px solid rgba(52,199,89,.18);
    }
    .statusBadge.offline {
      background: rgba(255,69,58,.12);
      color: #ff8b84;
      border: 1px solid rgba(255,69,58,.14);
    }
    .hostLine {
      margin-top: 18px;
      color: #dbe7fb;
      font-size: 15px;
    }
    .codeBlock {
      margin-top: 22px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .codeLabel {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .codeValue {
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
      word-break: break-word;
    }
    .codeValue.empty { color: var(--muted-2); }
    .quickStats {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .stat {
      padding: 14px 15px;
      border-radius: 20px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
    }
    .statLabel {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .statValue {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .metaBlock {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .metaRow {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: #d9e3f5;
    }
    .metaRow span:first-child { color: var(--muted); }
    .players {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.06);
      color: #edf3ff;
      font-size: 13px;
    }
    .formGrid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .field {
      display: grid;
      gap: 8px;
    }
    .field label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(9,14,24,.92);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }
    input:focus {
      border-color: rgba(102,163,255,.65);
      box-shadow: 0 0 0 4px rgba(102,163,255,.12);
    }
    .btnRow {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    button, .btn {
      padding: 12px 16px;
      border: 0;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ghost {
      background: rgba(255,255,255,.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
    }
    .saveMsg {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }
    .ok { color: #74e696; }
    .off { color: #ff8b84; }
    @media (max-width: 900px) {
      .grid2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .wrap { width: min(100vw - 24px, 1280px); }
      .hero { padding: 26px 20px 22px; border-radius: 28px; }
      .sectionHead { align-items: start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="topline">Teardown Room Bridge</div>
      <h1>本地桥接也该像云端面板一样顺眼，不像工具页一样硬邦邦。</h1>
      <div class="heroSub">上面看 bridge 现在有没有正常跳心跳，下面直接改房间名、房间码和云端上报地址。视觉、层级、卡片语言都跟云端保持一套风格。</div>
      <div class="heroMeta">
        <div class="metaPill"><span>状态</span><b id="heroStatus">--</b></div>
        <div class="metaPill"><span>人数</span><b id="heroCount">--</b></div>
        <div class="metaPill"><span>房主</span><b id="heroHost">--</b></div>
        <div class="metaPill"><span id="updated">--</span></div>
      </div>
    </div>

    <div class="section">
      <div class="sectionHead">
        <div>
          <div class="eyebrow">Bridge Runtime</div>
          <h2 class="sectionTitle">当前状态</h2>
          <div class="sectionDesc">本地 bridge 读到的实时房间信息。</div>
        </div>
        <div class="countBadge" id="summary">加载中...</div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="cardInner">
            <div class="cardTop">
              <div>
                <div class="miniLabel">LOCAL ROOM</div>
                <div class="roomName" id="roomName">未命名房间</div>
              </div>
              <div id="statusText" class="statusBadge offline">● 离线</div>
            </div>

            <div class="hostLine">房主：<span id="hostName">-</span></div>

            <div class="codeBlock">
              <div class="codeLabel">房间码</div>
              <div class="codeValue" id="roomCodeView">未填写</div>
            </div>

            <div class="quickStats">
              <div class="stat">
                <div class="statLabel">人数</div>
                <div class="statValue" id="count">0 / 0</div>
              </div>
              <div class="stat">
                <div class="statLabel">状态</div>
                <div class="statValue" id="statusWord">离线</div>
              </div>
            </div>

            <div class="metaBlock">
              <div class="metaRow"><span>心跳</span><span id="heartbeat">uptime=0 · last=0</span></div>
              <div class="metaRow"><span>原因</span><span id="reason">-</span></div>
              <div class="metaRow"><span>上报地址</span><span id="cloudEndpointView">-</span></div>
            </div>

            <div class="players" id="players"><span class="pill">暂无玩家</span></div>
          </div>
        </div>

        <div class="card">
          <div class="cardInner">
            <div class="cardTop">
              <div>
                <div class="miniLabel">Bridge Config</div>
                <div class="roomName">本地设置</div>
              </div>
              <div class="statusBadge online">● 可编辑</div>
            </div>

            <div class="formGrid">
              <div class="field">
                <label for="roomLabel">房间名称</label>
                <input id="roomLabel" placeholder="比如：塔科夫 mod 局 / 生存联机" />
              </div>
              <div class="field">
                <label for="roomCode">房间码</label>
                <input id="roomCode" placeholder="请复制游戏里显示的房间码" />
              </div>
              <div class="field">
                <label for="cloudEndpoint">云端地址</label>
                <input id="cloudEndpoint" placeholder="http://your-cloud-center:18080/report" />
              </div>
            </div>

            <div class="btnRow">
              <button onclick="saveConfig()">保存设置</button>
              <button class="ghost" onclick="openCloud()">打开云端网页</button>
            </div>
            <div id="saveMsg" class="saveMsg"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '').replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }

    function setStatus(online) {
      const el = document.getElementById('statusText');
      const word = document.getElementById('statusWord');
      const hero = document.getElementById('heroStatus');
      if (online) {
        el.className = 'statusBadge online';
        el.textContent = '● 在线';
        word.textContent = '在线';
        hero.textContent = '在线';
      } else {
        el.className = 'statusBadge offline';
        el.textContent = '● 离线';
        word.textContent = '离线';
        hero.textContent = '离线';
      }
    }

    async function loadConfig() {
      const r = await fetch('/config');
      const j = await r.json();
      roomLabel.value = j.roomLabel || '';
      roomCode.value = j.roomCode || '';
      cloudEndpoint.value = j.cloudEndpoint || '';
      roomName.textContent = j.roomLabel || '未命名房间';
      roomCodeView.textContent = j.roomCode || '未填写';
      roomCodeView.className = 'codeValue' + (j.roomCode ? '' : ' empty');
      cloudEndpointView.textContent = j.cloudEndpoint || '-';
    }

    async function saveConfig() {
      const msg = document.getElementById('saveMsg');
      msg.textContent = '保存中...';
      msg.className = 'saveMsg';
      try {
        const r = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            roomLabel: roomLabel.value,
            roomCode: roomCode.value,
            cloudEndpoint: cloudEndpoint.value
          })
        });
        const j = await r.json();
        if (j.ok) {
          msg.textContent = '已保存';
          msg.className = 'saveMsg ok';
          await loadConfig();
          await refresh();
        } else {
          msg.textContent = '保存失败';
          msg.className = 'saveMsg off';
        }
      } catch (e) {
        msg.textContent = '保存失败：' + String(e.message || e);
        msg.className = 'saveMsg off';
      }
    }

    function openCloud() {
      const endpoint = (cloudEndpoint.value || '').trim();
      const url = endpoint ? endpoint.replace(/\/report$/, '/') : '';
      if (url) window.open(url, '_blank');
      else {
        const msg = document.getElementById('saveMsg');
        msg.textContent = '先填云端地址';
        msg.className = 'saveMsg off';
      }
    }

    async function refresh() {
      try {
        const r = await fetch('/bridge/status?_=' + Date.now());
        const s = await r.json();
        const online = !!s.online;
        setStatus(online);
        roomName.textContent = s.roomLabel || roomLabel.value || '未命名房间';
        hostName.textContent = s.hostName || '-';
        count.textContent = `${s.playerCount || 0} / ${s.maxPlayers || 0}`;
        heartbeat.textContent = `uptime=${s.uptimeSeconds || 0} · last=${s.lastUpdate || 0}`;
        reason.textContent = s.offlineReason || '-';
        roomCodeView.textContent = s.roomCode || roomCode.value || '未填写';
        roomCodeView.className = 'codeValue' + ((s.roomCode || roomCode.value) ? '' : ' empty');
        cloudEndpointView.textContent = s.cloudEndpoint || cloudEndpoint.value || '-';
        heroCount.textContent = `${s.playerCount || 0}/${s.maxPlayers || 0}`;
        heroHost.textContent = s.hostName || '-';
        updated.textContent = '更新于 ' + new Date().toLocaleTimeString();
        summary.textContent = `${online ? '桥接在线' : '桥接离线'} · clientId ${s.clientId || '-'}`;
        const list = s.players || [];
        players.innerHTML = list.length
          ? list.map(x => `<span class="pill">${esc(x)}</span>`).join('')
          : '<span class="pill">暂无玩家</span>';
      } catch (e) {
        setStatus(false);
        reason.textContent = String(e.message || e);
        summary.textContent = '状态读取失败';
        updated.textContent = '更新失败';
      }
    }

    loadConfig().then(refresh);
    setInterval(refresh, 1000);
  </script>
</body>
</html>
